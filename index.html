/* ============================================================
   CSS Reset & Base
   ============================================================ */
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

:root {
  --bg: #0a0a0f;
  --bg-card: rgba(20, 20, 35, 0.85);
  --gold-1: #f5d78c;
  --gold-2: #c4963a;
  --gold-3: #8b6914;
  --neon-gold: #ffd700;
  --neon-amber: #ffb347;
  --text: #e8e0d0;
  --text-dim: #8a8578;
  --red: #e04040;
  --green: #40c080;
  --radius: 16px;
  --radius-sm: 10px;
}

html, body {
  width: 100%; min-height: 100vh; min-height: 100dvh;
  background: var(--bg);
  font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", "Noto Sans SC", sans-serif;
  color: var(--text);
  overflow-x: hidden;
  -webkit-tap-highlight-color: transparent;
  -webkit-font-smoothing: antialiased;
}

/* Subtle animated background grain */
body::before {
  content: '';
  position: fixed; inset: 0; z-index: 0;
  background:
    radial-gradient(ellipse at 20% 20%, rgba(255, 215, 0, 0.04) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 60%, rgba(255, 180, 50, 0.03) 0%, transparent 50%),
    radial-gradient(ellipse at 50% 90%, rgba(200, 150, 50, 0.05) 0%, transparent 40%);
  pointer-events: none;
}

#app {
  position: relative; z-index: 1;
  max-width: 480px; margin: 0 auto;
  min-height: 100vh; min-height: 100dvh;
  display: flex; flex-direction: column; align-items: center;
  padding: 20px 16px 40px;
}

/* ============================================================
   Typography
   ============================================================ */
.gold-text {
  background: linear-gradient(135deg, var(--gold-1), var(--gold-2), var(--gold-1));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
}

.neon-glow {
  text-shadow: 0 0 20px rgba(255, 215, 0, 0.5), 0 0 40px rgba(255, 180, 0, 0.3), 0 0 80px rgba(255, 150, 0, 0.15);
}

/* ============================================================
   Screen Management
   ============================================================ */
.screen { display: none; flex-direction: column; align-items: center; width: 100%; flex: 1; }
.screen.active { display: flex; }

/* ============================================================
   Home Screen
   ============================================================ */
#home-screen { justify-content: center; gap: 32px; padding-top: 10vh; }

.home-icon {
  width: 80px; height: 80px;
  border-radius: 50%;
  background: linear-gradient(135deg, rgba(255,215,0,0.15), rgba(200,150,50,0.1));
  border: 2px solid rgba(255,215,0,0.3);
  display: flex; align-items: center; justify-content: center;
  font-size: 40px;
  animation: iconPulse 3s ease-in-out infinite;
  box-shadow: 0 0 30px rgba(255,215,0,0.2), inset 0 0 30px rgba(255,215,0,0.05);
}

@keyframes iconPulse {
  0%, 100% { box-shadow: 0 0 30px rgba(255,215,0,0.2), inset 0 0 30px rgba(255,215,0,0.05); }
  50% { box-shadow: 0 0 50px rgba(255,215,0,0.4), inset 0 0 50px rgba(255,215,0,0.1); }
}

.home-title {
  font-size: 42px; font-weight: 900; letter-spacing: 4px; text-align: center;
  line-height: 1.3;
}

.home-subtitle {
  font-size: 16px; color: var(--text-dim); letter-spacing: 8px; text-align: center;
  margin-top: -16px;
}

.quota-badge {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 20px; border-radius: 20px;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  font-size: 13px; color: var(--text-dim);
}

.quota-badge .count { color: var(--neon-gold); font-weight: 700; font-size: 16px; }

/* ============================================================
   Buttons
   ============================================================ */
.btn-primary {
  position: relative;
  padding: 16px 48px;
  font-size: 20px; font-weight: 700; letter-spacing: 4px;
  color: #1a1a0a;
  background: linear-gradient(135deg, var(--gold-1), var(--gold-2));
  border: none; border-radius: 50px;
  cursor: pointer;
  transition: all 0.3s ease;
  box-shadow: 0 4px 30px rgba(255, 180, 0, 0.3);
  -webkit-tap-highlight-color: transparent;
  user-select: none;
  -webkit-user-select: none;
}

.btn-primary:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 40px rgba(255, 180, 0, 0.5);
}

.btn-primary:active {
  transform: scale(0.96);
  transition: transform 0.1s;
}

.btn-primary:disabled {
  opacity: 0.4; cursor: not-allowed; transform: none;
  box-shadow: none;
}

.btn-secondary {
  padding: 12px 32px;
  font-size: 16px; font-weight: 600; letter-spacing: 2px;
  color: var(--gold-1);
  background: transparent;
  border: 1.5px solid rgba(255,215,0,0.4);
  border-radius: 50px;
  cursor: pointer;
  transition: all 0.3s ease;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
  -webkit-user-select: none;
}

.btn-secondary:hover {
  background: rgba(255,215,0,0.1);
  border-color: rgba(255,215,0,0.7);
}

.btn-download {
  padding: 14px 40px;
  font-size: 18px; font-weight: 700; letter-spacing: 2px;
  color: #0a0a0f;
  background: linear-gradient(135deg, #4ade80, #22c55e);
  border: none; border-radius: 50px;
  cursor: pointer;
  box-shadow: 0 4px 25px rgba(74, 222, 128, 0.3);
  transition: all 0.3s ease;
  -webkit-tap-highlight-color: transparent;
  animation: downloadGlow 2s ease-in-out infinite;
}

@keyframes downloadGlow {
  0%, 100% { box-shadow: 0 4px 25px rgba(74, 222, 128, 0.3); }
  50% { box-shadow: 0 4px 45px rgba(74, 222, 128, 0.6); }
}

.btn-share {
  padding: 10px 28px;
  font-size: 14px; font-weight: 600;
  color: var(--text-dim);
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 50px;
  cursor: pointer;
  transition: all 0.3s ease;
  -webkit-tap-highlight-color: transparent;
}

.btn-share:hover { color: #fff; border-color: rgba(255,255,255,0.3); }

/* ============================================================
   Shaking Screen
   ============================================================ */
#shaking-screen { justify-content: center; align-items: center; gap: 40px; }

.lot-container {
  width: 120px; height: 200px;
  background: linear-gradient(180deg, #2a1f0a, #4a3020, #2a1f0a);
  border-radius: 20px;
  border: 3px solid var(--gold-2);
  position: relative;
  box-shadow: 0 0 40px rgba(255,180,0,0.3), inset 0 0 20px rgba(0,0,0,0.5);
  display: flex; align-items: center; justify-content: center;
}

.lot-container::before {
  content: '签';
  font-size: 48px; font-weight: 900;
  color: var(--gold-1);
  text-shadow: 0 0 10px rgba(255,215,0,0.5);
}

.lot-container::after {
  content: '';
  position: absolute; bottom: -8px; left: 20%; right: 20%; height: 12px;
  background: linear-gradient(180deg, #3a2010, #1a1008);
  border-radius: 0 0 50% 50%;
}

.shaking .lot-container {
  animation: shakeTube 0.15s ease-in-out infinite;
}

@keyframes shakeTube {
  0%, 100% { transform: translateX(0) rotate(0deg); }
  25% { transform: translateX(-8px) rotate(-8deg); }
  50% { transform: translateX(0) rotate(0deg); }
  75% { transform: translateX(8px) rotate(8deg); }
}

.shaking-text {
  font-size: 18px; color: var(--gold-1); letter-spacing: 4px;
  animation: textFlicker 0.3s ease-in-out infinite;
}

@keyframes textFlicker {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.5; }
}

/* Floating particles during shake */
.shake-particles {
  position: absolute; width: 100%; height: 100%; pointer-events: none;
}

.particle {
  position: absolute;
  width: 4px; height: 4px;
  background: var(--neon-gold);
  border-radius: 50%;
  animation: particleFly 0.8s ease-out infinite;
}

@keyframes particleFly {
  0% { transform: translate(0,0) scale(1); opacity: 1; }
  100% { transform: translate(var(--dx), var(--dy)) scale(0); opacity: 0; }
}

/* ============================================================
   Loading Screen
   ============================================================ */
#loading-screen { justify-content: center; gap: 32px; }

.spinner-ring {
  width: 60px; height: 60px;
  border: 3px solid rgba(255,215,0,0.15);
  border-top-color: var(--gold-1);
  border-radius: 50%;
  animation: spin 1s linear infinite;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

.loading-text {
  font-size: 15px; color: var(--text-dim); letter-spacing: 2px;
  text-align: center; line-height: 1.8;
}

.loading-dots::after {
  content: '';
  animation: dots 1.5s steps(4, end) infinite;
}

@keyframes dots {
  0% { content: ''; }
  25% { content: '.'; }
  50% { content: '..'; }
  75% { content: '...'; }
  100% { content: ''; }
}

/* ============================================================
   Result Screen
   ============================================================ */
#result-screen { gap: 20px; padding-top: 10px; }

.image-container {
  position: relative;
  width: 100%;
  aspect-ratio: 9 / 16;
  max-height: 60vh;
  border-radius: var(--radius);
  overflow: hidden;
  background: #111;
  border: 2px solid rgba(255,215,0,0.2);
  box-shadow: 0 0 40px rgba(0,0,0,0.5);
}

.image-container img {
  width: 100%; height: 100%; object-fit: cover;
  transition: filter 0.5s ease;
}

.image-container img.blurred {
  filter: blur(12px) brightness(0.7);
}

/* Watermark overlay */
.watermark-overlay {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  pointer-events: none; z-index: 2;
}

.watermark-overlay .watermark-text {
  font-size: clamp(28px, 8vw, 48px);
  font-weight: 900; letter-spacing: 8px;
  color: rgba(255, 255, 255, 0.12);
  border: 3px solid rgba(255, 255, 255, 0.1);
  padding: 12px 24px;
  transform: rotate(-25deg);
  white-space: nowrap;
  text-shadow: 0 0 10px rgba(255,255,255,0.1);
  backdrop-filter: blur(2px);
}

/* Fortune type badge */
.fortune-type-badge {
  display: inline-block;
  padding: 6px 20px;
  font-size: 28px; font-weight: 900; letter-spacing: 6px;
  border-radius: 50px;
  border: 2px solid;
}

.fortune-type-badge.daji {
  color: #ff4444;
  border-color: rgba(255,68,68,0.4);
  background: rgba(255,68,68,0.1);
  text-shadow: 0 0 20px rgba(255,68,68,0.5);
}

.fortune-type-badge.zhongji {
  color: #ff8c00;
  border-color: rgba(255,140,0,0.4);
  background: rgba(255,140,0,0.1);
  text-shadow: 0 0 20px rgba(255,140,0,0.5);
}

.fortune-type-badge.xiaoji {
  color: #ffb347;
  border-color: rgba(255,179,71,0.4);
  background: rgba(255,179,71,0.1);
  text-shadow: 0 0 20px rgba(255,179,71,0.5);
}

.fortune-type-badge.ji {
  color: #ffd700;
  border-color: rgba(255,215,0,0.4);
  background: rgba(255,215,0,0.1);
  text-shadow: 0 0 20px rgba(255,215,0,0.5);
}

.fortune-type-badge.xiong {
  color: #8888cc;
  border-color: rgba(136,136,204,0.4);
  background: rgba(136,136,204,0.1);
  text-shadow: 0 0 20px rgba(136,136,204,0.5);
}

.fortune-type-badge.xiaoxiong {
  color: #9999aa;
  border-color: rgba(153,153,170,0.4);
  background: rgba(153,153,170,0.1);
  text-shadow: 0 0 20px rgba(153,153,170,0.5);
}

/* Fortune card */
.fortune-card {
  width: 100%;
  padding: 20px 24px;
  background: var(--bg-card);
  border-radius: var(--radius);
  border: 1px solid rgba(255,215,0,0.15);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
}

.fortune-label {
  font-size: 12px; color: var(--text-dim); letter-spacing: 4px;
  margin-bottom: 8px; text-transform: uppercase;
}

.fortune-text {
  font-size: 16px; line-height: 1.9; color: var(--text);
  letter-spacing: 1px;
}

.deep-analysis {
  margin-top: 16px; padding-top: 16px;
  border-top: 1px solid rgba(255,215,0,0.15);
  font-size: 14px; line-height: 1.9; color: var(--gold-1);
  letter-spacing: 1px;
}

/* Result buttons group */
.result-buttons {
  display: flex; flex-direction: column; gap: 12px; width: 100%; align-items: center;
}

/* ============================================================
   Payment Modal
   ============================================================ */
.modal-mask {
  position: fixed; inset: 0; z-index: 100;
  background: rgba(0,0,0,0.8);
  backdrop-filter: blur(4px);
  -webkit-backdrop-filter: blur(4px);
  display: flex; align-items: center; justify-content: center;
  padding: 20px;
}

.modal-mask.hidden { display: none; }

.payment-modal {
  width: 100%; max-width: 340px;
  background: var(--bg-card);
  border-radius: var(--radius);
  border: 1px solid rgba(255,215,0,0.2);
  padding: 32px 24px;
  text-align: center;
  box-shadow: 0 20px 60px rgba(0,0,0,0.5);
}

.payment-modal h3 {
  font-size: 22px; letter-spacing: 4px;
  margin-bottom: 20px;
}

.payment-modal .qr-wrapper {
  display: inline-block;
  padding: 12px; background: #fff; border-radius: 12px;
  margin-bottom: 16px;
}

.payment-modal .qr-wrapper img {
  display: block; width: 180px; height: 180px;
}

.payment-modal .price {
  font-size: 24px; font-weight: 700; color: var(--neon-gold);
  margin-bottom: 8px;
}

.payment-modal .status {
  font-size: 13px; color: var(--text-dim);
  margin-bottom: 20px;
}

.payment-modal .status.paid {
  color: var(--green); font-weight: 700; font-size: 16px;
}

.payment-modal .btn-cancel {
  padding: 10px 32px;
  font-size: 14px; color: var(--text-dim);
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 50px;
  cursor: pointer;
  transition: all 0.3s;
}

/* ============================================================
   Toast
   ============================================================ */
.toast {
  position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%);
  z-index: 200;
  padding: 12px 28px;
  background: rgba(30,30,50,0.95);
  border: 1px solid rgba(255,215,0,0.3);
  border-radius: 50px;
  font-size: 14px; color: var(--text);
  letter-spacing: 1px;
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  animation: toastIn 0.3s ease, toastOut 0.3s ease 2.5s forwards;
  pointer-events: none;
}

@keyframes toastIn {
  from { opacity: 0; transform: translateX(-50%) translateY(20px); }
  to { opacity: 1; transform: translateX(-50%) translateY(0); }
}

@keyframes toastOut {
  from { opacity: 1; }
  to { opacity: 0; }
}

/* ============================================================
   Footer
   ============================================================ */
.app-footer {
  width: 100%; text-align: center; padding: 20px 0 10px;
  font-size: 11px; color: rgba(255,255,255,0.2);
  letter-spacing: 2px;
}

/* ============================================================
   Responsive: Desktop
   ============================================================ */
@media (min-width: 769px) {
  #app {
    padding: 40px 16px 60px;
  }
  .image-container {
    max-height: 55vh;
    max-width: 380px;
  }
  .home-title { font-size: 52px; }
}

/* ============================================================
   Utility
   ============================================================ */
.hidden { display: none !important; }
.text-center { text-align: center; }
.w-full { width: 100%; }
.mt-8 { margin-top: 8px; }
.mt-16 { margin-top: 16px; }
</style>

/* ============================================================

   ============================================================ */
const STORAGE_KEY = 'fortunewallpaper_data';

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    return raw ? JSON.parse(raw) : {};
  } catch (e) {
    return {};
  }
}

function saveState(state) {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  } catch (e) {
    // Storage full or unavailable
  }
}

function getToday() {
  return new Date().toISOString().split('T')[0];
}

function checkAndUpdateQuota() {
  const state = loadState();
  const today = getToday();

  if (state.lastFreeDate !== today) {
    state.lastFreeDate = today;
    state.freeCount = 0;
  }

  const remaining = CONFIG.DAILY_FREE_LIMIT - (state.freeCount || 0);
  return { state, remaining, today };
}

function useFreeQuota(state) {
  state.freeCount = (state.freeCount || 0) + 1;
  saveState(state);
}

function markPaid(orderId) {
  const state = loadState();
  state.isPaid = true;
  state.paidOrderId = orderId;
  saveState(state);
}

function isUserPaid() {
  return loadState().isPaid === true;
}

/* ============================================================
   IMAGE GENERATION (Pollinations.ai)
   ============================================================ */
function buildImageUrl(fortuneElement, width, height) {
  const basePrompt = `Cyberpunk Chinese style, ${fortuneElement}, ultra detailed, 4K, vertical mobile wallpaper, dark mystical background, neon glow, gold accents`;
  const encoded = encodeURIComponent(basePrompt);
  return `https://image.pollinations.ai/prompt/${encoded}?width=${width}&height=${height}&nologo=true&timestamp=${Date.now()}`;
}

function loadImage(url) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.crossOrigin = 'anonymous';
    img.onload = () => resolve(url);
    img.onerror = () => {
      // Retry once with different timestamp
      const retryUrl = url.replace(/timestamp=\d+/, `timestamp=${Date.now()}`);
      const img2 = new Image();
      img2.crossOrigin = 'anonymous';
      img2.onload = () => resolve(retryUrl);
      img2.onerror = () => reject(new Error('Image generation failed'));
      img2.src = retryUrl;
    };
    img.src = url;
    // Timeout after 30 seconds
    setTimeout(() => reject(new Error('Image load timeout')), 30000);
  });
}

   FORTUNE TEXT GENERATION (DeepSeek API)
   ============================================================ */
async function generateFortuneText(fortuneType) {
  // If no API key configured, use fallback immediately
  if (!CONFIG.DEEPSEEK_API_KEY || CONFIG.DEEPSEEK_API_KEY === 'YOUR_DEEPSEEK_API_KEY') {
    console.warn('DeepSeek API Key 未配置，使用本地备选签文');
    return getFallbackFortune(fortuneType);
  }

  try {
    const response = await fetch('https://api.deepseek.com/v1/chat/completions', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${CONFIG.DEEPSEEK_API_KEY}`,
      },
      body: JSON.stringify({
        model: 'deepseek-chat',
        messages: [
          {
            role: 'system',
            content: '你是一个古代预言大师，精通命理与占卜。请根据签种生成一段80字的现代励志解读，语言要优美、治愈、接地气，给人以希望和力量。不要使用序号或列表格式，直接输出连续的文字段落。'
          },
          {
            role: 'user',
            content: `签种：${fortuneType}。请为我解读这支签。`
          }
        ],
        max_tokens: 200,
        temperature: 0.8,
      }),
    });

    if (!response.ok) throw new Error(`API error: ${response.status}`);
    const data = await response.json();
    const text = data.choices?.[0]?.message?.content?.trim();
    if (text && text.length > 10) return text;
    throw new Error('Empty or too short response');
  } catch (err) {
    console.warn('DeepSeek API 调用失败，使用本地备选签文:', err.message);
    return getFallbackFortune(fortuneType);
  }
}

function getFallbackFortune(fortuneType) {
  const candidates = FALLBACK_FORTUNES.filter(f => f.type === fortuneType);

    return FALLBACK_FORTUNES[Math.floor(Math.random() * FALLBACK_FORTUNES.length)].text;
  }
  return candidates[Math.floor(Math.random() * candidates.length)].text;
}

      if (state.freeCount < CONFIG.DAILY_FREE_LIMIT) {
        useFreeQuota(state);
      }
    }

    // 7. Show result
    showResult();

    console.error('Draw failed:', err);

  img.classList.remove('blurred');
  // Switch to high-res image
  img.src = currentPaidImageUrl;

  // Hide pay button, show download
  $('btn-pay').classList.add('hidden');
  $('btn-download').classList.remove('hidden');

  // Show deep analysis
  $('deep-analysis').classList.remove('hidden');
  if (currentDeepAnalysis) {
    $('deep-analysis-text').textContent = currentDeepAnalysis;
  } else {
    // Lazy generate deep analysis
    $('deep-analysis-text').textContent = '命理深邃，正在为你解读...';
    generateDeepAnalysis(currentFortune.type).then(text => {
      currentDeepAnalysis = text;
      $('deep-analysis-text').textContent = text;
    });
  }
}

/* ============================================================
   PAYMENT (PAYJS)
   ============================================================ */
let paymentPollTimer = null;
let currentOrderId = null;

async function startPayment() {
  // Check if PAYJS is configured
  if (!CONFIG.PAYJS_MCHID || CONFIG.PAYJS_MCHID === 'YOUR_PAYJS_MCHID') {
    showToast('支付功能尚未配置，请联系站长配置 PAYJS 商户号 💳');
    return;
  }

  // Generate unique order ID
  currentOrderId = 'FS_' + Date.now() + '_' + Math.random().toString(36).substr(2, 6);

  // Show payment modal
  $('payment-modal').classList.remove('hidden');
  $('payment-status').textContent = '正在创建订单...';
  $('payment-status').className = 'status';

  try {
    // Create order on PAYJS
    const formData = new URLSearchParams();
    formData.append('mchid', CONFIG.PAYJS_MCHID);
    formData.append('total_fee', CONFIG.PAY_AMOUNT);
    formData.append('out_trade_no', currentOrderId);
    formData.append('body', '今日上上签·高清壁纸解锁');
    if (CONFIG.PAYJS_NOTIFY_URL) {
      formData.append('notify_url', CONFIG.PAYJS_NOTIFY_URL);
    }

    const response = await fetch('https://payjs.cn/api/native', {
      method: 'POST',
      headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
      body: formData.toString(),
    });

    const data = await response.json();

    if (data.return_code === 1) {
      // Generate QR code from code_url
      const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(data.code_url)}`;
      $('qr-image').src = qrUrl;
      $('payment-status').textContent = '请使用微信扫码支付';
      $('payment-status').className = 'status';

      // Start polling
      startPaymentPolling(data.out_trade_no);
    } else {
      $('payment-status').textContent = '订单创建失败: ' + (data.return_msg || '未知错误');
      $('payment-status').className = 'status';
    }
  } catch (err) {
    console.error('Payment error:', err);
    $('payment-status').textContent = '网络错误，请稍后重试';
    $('payment-status').className = 'status';
  }
}

function startPaymentPolling(outTradeNo) {
  if (paymentPollTimer) clearInterval(paymentPollTimer);

  paymentPollTimer = setInterval(async () => {
    try {
      const formData = new URLSearchParams();
      formData.append('mchid', CONFIG.PAYJS_MCHID);
      formData.append('out_trade_no', outTradeNo);

      const response = await fetch('https://payjs.cn/api/check', {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: formData.toString(),
      });

      const data = await response.json();

      if (data.return_code === 1 && data.status === 1) {
        // Payment success!
        clearInterval(paymentPollTimer);
        paymentPollTimer = null;

        $('payment-status').textContent = '✅ 支付成功！';
        $('payment-status').className = 'status paid';

        markPaid(outTradeNo);

        // Generate deep analysis
        currentDeepAnalysis = await generateDeepAnalysis(currentFortune.type);

        // Close modal after short delay
        setTimeout(() => {
          closePayment();
          showPaidUI();
          showToast('🎉 支付成功！高清壁纸已解锁');
        }, 1500);
      }
    } catch (err) {
      console.warn('Payment poll error:', err);
    }
  }, 2000);

  // Stop polling after 5 minutes
  setTimeout(() => {
    if (paymentPollTimer) {
      clearInterval(paymentPollTimer);
      paymentPollTimer = null;
      if ($('payment-modal').classList.contains('hidden') === false) {
        $('payment-status').textContent = '支付超时，请重新扫码';
        $('payment-status').className = 'status';
      }
    }
  }, 300000);
}

function closePayment() {
  if (paymentPollTimer) {
    clearInterval(paymentPollTimer);
    paymentPollTimer = null;
  }
  $('payment-modal').classList.add('hidden');
  $('qr-image').src = '';
}

/* ============================================================
   DOWNLOAD HD WALLPAPER
   ============================================================ */
async function downloadHD() {
  const btn = $('btn-download');
  btn.disabled = true;
  btn.textContent = '生成中...';

  try {
    showToast('正在生成 4K 高清壁纸，请稍候... 📥');

    // Load the high-res image
    const hdUrl = currentPaidImageUrl || buildImageUrl(currentFortune.element, CONFIG.PAID_IMAGE_WIDTH, CONFIG.PAID_IMAGE_HEIGHT);

    // Fetch image as blob
    const response = await fetch(hdUrl);
    if (!response.ok) throw new Error('Download failed');
    const blob = await response.blob();

    // Trigger download
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `今日上上签_${currentFortune.type}_${getToday()}.png`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);

    showToast('✅ 高清壁纸下载成功！');
  } catch (err) {
    console.error('Download error:', err);
    // Fallback: open image in new tab
    const hdUrl = currentPaidImageUrl || buildImageUrl(currentFortune.element, CONFIG.PAID_IMAGE_WIDTH, CONFIG.PAID_IMAGE_HEIGHT);
    window.open(hdUrl, '_blank');
    showToast('已在新标签页打开壁纸，请长按保存 💾');
  } finally {
    btn.disabled = false;
    btn.textContent = '📥 下载 4K 高清壁纸';
  }
}

/* ============================================================
   SHARE
   ============================================================ */
function shareFortune() {
  const shareData = {
    title: '今日上上签·AI灵境壁纸',
    text: `我抽到了「${currentFortune?.type || '吉'}」签！${currentFortuneText?.substring(0, 30) || '快来抽你的今日灵签吧'}...`,
    url: window.location.href,
  };

  if (navigator.share) {
    navigator.share(shareData).catch(() => {
      // User cancelled, no-op
    });
  } else {
    // Fallback: copy link
    navigator.clipboard.writeText(window.location.href).then(() => {
      showToast('链接已复制，快去分享给好友吧 📋');
    }).catch(() => {
      showToast('分享链接：' + window.location.href);
    });
  }
}
