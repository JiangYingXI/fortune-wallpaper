.lot-container::after {
  content: '';

  border-radius: 0 0 50% 50%;

.shaking .lot-container {

@keyframes shakeTube {
  0%, 100% { transform: translateX(0) rotate(0deg); }

@keyframes textFlicker {

  50% { opacity: 0.5; }
}

.shake-particles {

}

.particle {

  width: 4px; height: 4px;
  background: var(--neon-gold);
  border-radius: 50%;
  animation: particleFly 0.8s ease-out infinite;
}

@keyframes particleFly {
  0% { transform: translate(0,0) scale(1); opacity: 1; }
  100% { transform: translate(var(--dx), var(--dy)) scale(0); opacity: 0; }
}

.loading-text {

}

.loading-dots::after {
  content: '';

}

@keyframes dots {
  0% { content: ''; }
  25% { content: '.'; }

/* ============================================================
   LOCAL STORAGE HELPERS
   ============================================================ */
const STORAGE_KEY = 'fortunewallpaper_data';

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    return raw ? JSON.parse(raw) : {};
  } catch (e) {
    return {};
  }
}

function saveState(state) {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  } catch (e) {}
}

function getBeijingDate() {
  const now = new Date();
  const beijing = new Date(now.getTime() + 8 * 60 * 60 * 1000);
  return beijing.toISOString().split('T')[0];
}

function getDeviceId() {
  const state = loadState();
  if (!state.deviceId) {
    state.deviceId = 'dev_' + Date.now() + '_' + Math.random().toString(36).substr(2, 8);
    saveState(state);
  }
  return state.deviceId;
}

/* ============================================================
   MEMBER & QUOTA MANAGEMENT
   ============================================================ */
function isMember() {
  const state = loadState();
  if (!state.memberExpireTime) return false;
  const now = Date.now();
  return now < state.memberExpireTime;
}

function getMemberExpireDate() {
  const state = loadState();
  if (!state.memberExpireTime) return null;
  return new Date(state.memberExpireTime);
}

function checkAndUpdateQuota() {
  const state = loadState();
  const today = getBeijingDate();

  if (state.lastFreeDate !== today) {
    state.lastFreeDate = today;
    state.freeCount = 0;
  }

  if (state.dailyExtraDrawDate !== today) {
    state.dailyExtraDrawDate = today;
    state.dailyExtraCount = 0;
  }

  const memberActive = isMember();
  let remaining = 0;

  if (memberActive) {
    remaining = 99; // member: unlimited
  } else {
    const freeLeft = CONFIG.DAILY_FREE_LIMIT - (state.freeCount || 0);
    const extraLeft = state.dailyExtraCount || 0;
    remaining = freeLeft + extraLeft;
  }

  return { state, remaining, today, memberActive };
}

function consumeDraw() {
  const state = loadState();
  const today = getBeijingDate();

  if (state.dailyExtraDrawDate !== today) {
    state.dailyExtraDrawDate = today;
    state.dailyExtraCount = 0;
  }

  if (isMember()) {
    // member: no consumption tracking needed
    return;
  }

  const extraLeft = state.dailyExtraCount || 0;
  if (extraLeft > 0) {
    state.dailyExtraCount = extraLeft - 1;
  } else {
    state.freeCount = (state.freeCount || 0) + 1;
  }

  saveState(state);
}

function updateQuotaDisplay() {
  const { remaining, memberActive } = checkAndUpdateQuota();
  const el = $('quota-count');
  if (el) {
    if (memberActive) {
      el.textContent = '∞';
      el.style.color = 'var(--green)';
    } else {
      el.textContent = remaining;
      el.style.color = remaining <= 2 ? '#ff6b6b' : 'var(--neon-gold)';
    }
  }

  const badge = document.querySelector('.quota-badge span:first-child');
  if (badge) {
    if (memberActive) {
      badge.textContent = '👑 会员无限';
    } else if (remaining > 0 && remaining <= CONFIG.FREE_HQ_COUNT) {
      badge.textContent = '🎁 高清剩余';
    } else {
      badge.textContent = '✨ 今日剩余';
    }
  }

  // Update member badge
  const memberBadge = $('member-badge');
  if (memberBadge) {
    if (memberActive) {
      const expireDate = getMemberExpireDate();
      const expireStr = expireDate ? expireDate.toLocaleDateString('zh-CN') : '';
      memberBadge.textContent = `👑 会员有效期至 ${expireStr}`;
      memberBadge.classList.remove('hidden');
    } else {
      memberBadge.classList.add('hidden');
    }
  }
}

/* ============================================================
   ACTIVATION CODE HANDLING
   ============================================================ */
function activateMember() {
  const input = $('activation-code').value.trim().toUpperCase();
  if (!input) {
    showToast('请输入激活码');
    return;
  }

  // 本地激活码校验（上线后改为后端校验）
  let days = 0;
  let type = '';
  if (input === 'MEMBER30') { days = 30; type = '月度会员'; }
  else if (input === 'HALFYEAR') { days = 180; type = '半年会员'; }
  else {
    // 尝试后端验证
    showToast('❌ 激活码无效，请确认后重新输入');
    $('activation-code').value = '';
    return;
  }

  const state = loadState();
  const now = Date.now();
  const currentExpire = state.memberExpireTime || 0;
  // 如果已过期或没有会员，从当前时间开始；否则在原有效期上叠加
  const newExpire = Math.max(now, currentExpire) + days * 24 * 60 * 60 * 1000;
  state.memberExpireTime = newExpire;
  saveState(state);

  showToast(`🎉 ${type}激活成功！有效期${days}天`);
  closePaymentModal();
  updateQuotaDisplay();
}

/* ============================================================

   ============================================================ */
function createParticles() {
  const container = $('particles');
  container.innerHTML = '';
  for (let i = 0; i < 20; i++) {
    const particle = document.createElement('div');
    particle.className = 'particle';
    particle.style.left = (30 + Math.random() * 40) + '%';
    particle.style.top = (30 + Math.random() * 40) + '%';
    particle.style.setProperty('--dx', (Math.random() - 0.5) * 120 + 'px');
    particle.style.setProperty('--dy', (Math.random() - 0.5) * 120 + 'px');
    particle.style.animationDelay = Math.random() * 0.8 + 's';
    container.appendChild(particle);
  }
}

function playShakeAnimation() {
  return new Promise((resolve) => {
    showScreen('shaking-screen');
    const screen = $('shaking-screen');
    screen.classList.add('shaking');
    createParticles();
    setTimeout(() => {
      screen.classList.remove('shaking');
      resolve();
    }, 1500);
  });
}

/* ============================================================

   ============================================================ */
function buildImageUrl(fortuneElement, width, height) {
  const basePrompt = `minimalist Chinese aesthetic, ${fortuneElement}, elegant simplicity, warm golden tones, soft lighting, vertical mobile wallpaper, high quality`;
  const encoded = encodeURIComponent(basePrompt);
  return `https://image.pollinations.ai/prompt/${encoded}?width=${width}&height=${height}&nologo=true&timestamp=${Date.now()}`;
}

async function generateDeepAnalysis(fortuneType) {
  // 深度解析仅对会员开放；非会员走本地备选
  try {
    if (CONFIG.API_BACKEND_URL) {
      const response = await fetch(`${CONFIG.API_BACKEND_URL}/deep-analysis`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ fortuneType, deviceId: getDeviceId() }),
      });
      if (response.ok) {
        const data = await response.json();
        if (data.text && data.text.length > 30) return data.text;
      }
    }
  } catch (err) {
    console.warn('后端深度解析失败，使用备选:', err.message);
  }
  return DEEP_ANALYSIS_FALLBACKS[fortuneType] || '命理深邃，天机不可尽述。愿你在今日的旅途中，保持一颗平和的心，所有的美好都将如约而至。';
}

const AppData = {
  currentFortune: null,
  currentFreeImageUrl: null,
  currentPaidImageUrl: null,
  currentFortuneText: '',
  currentDeepAnalysis: '',
  currentDrawNumber: 0,
};

async function startDraw() {
  if (drawCooldown) {
    showToast('请稍候，冷却中...');
    return;
  }

  const { state, remaining, memberActive } = checkAndUpdateQuota();

  if (remaining <= 0 && !memberActive) {
    showToast('今日次数已用完，点击升级会员或购买增量包 🔒');
    showPaymentModal();
    return;
  }

  const btn = $('btn-draw');
  btn.disabled = true;
  btn.textContent = '灵签生成中...';
  drawCooldown = true;
  setTimeout(() => { drawCooldown = false; }, CONFIG.DRAW_COOLDOWN);

  try {
    AppData.currentFortune = pickFortune();
    AppData.currentDrawNumber = (state.freeCount || 0) + 1 + (state.dailyExtraCount || 0);
    AppData.currentFortuneText = pickFortuneText(AppData.currentFortune.type);

    let imgWidth, imgHeight;
    if (memberActive) {
      imgWidth = CONFIG.PAID_IMAGE_WIDTH;
      imgHeight = CONFIG.PAID_IMAGE_HEIGHT;
    } else if (AppData.currentDrawNumber <= CONFIG.FREE_HQ_COUNT) {
      imgWidth = CONFIG.FREE_HQ_WIDTH;
      imgHeight = CONFIG.FREE_HQ_HEIGHT;
    } else {
      imgWidth = CONFIG.FREE_MQ_WIDTH;
      imgHeight = CONFIG.FREE_MQ_HEIGHT;
    }

    AppData.currentFreeImageUrl = buildImageUrl(AppData.currentFortune.element, imgWidth, imgHeight);
    AppData.currentPaidImageUrl = buildImageUrl(AppData.currentFortune.element, CONFIG.PAID_IMAGE_WIDTH, CONFIG.PAID_IMAGE_HEIGHT);

    await playShakeAnimation();
    showResultSkeleton();
    $('fortune-text').textContent = AppData.currentFortuneText;

    const img = $('result-image');
    img.src = AppData.currentFreeImageUrl;

    if (!memberActive) consumeDraw();

    // 会员自动加载深度解析
    if (memberActive && !AppData.currentDeepAnalysis) {
      $('deep-analysis').classList.remove('hidden');
      $('deep-analysis-text').textContent = '命理深邃，正在为你解读...';
      generateDeepAnalysis(AppData.currentFortune.type).then(text => {
        AppData.currentDeepAnalysis = text;
        $('deep-analysis-text').textContent = text;
      });
    }

  } catch (err) {
    console.error('Draw failed:', err);
    AppData.currentFortuneText = pickFortuneText(AppData.currentFortune?.type || '吉');
    AppData.currentFreeImageUrl = buildImageUrl(AppData.currentFortune?.element || 'golden sunrise',
      CONFIG.FREE_HQ_WIDTH, CONFIG.FREE_HQ_HEIGHT);
    showResultImmediate();
    showToast('网络波动，已为您使用本地备选方案 ✨');
  } finally {
    btn.disabled = false;
    btn.textContent = '🎋 抽今日灵签';
    updateQuotaDisplay();
  }
}

  }

/* ============================================================
   DOWNLOAD HD WALLPAPER
   ============================================================ */
async function downloadHD() {
  const btn = $('btn-download');
  btn.disabled = true;
  btn.textContent = '生成中...';

  try {
    showToast('正在生成 4K 高清壁纸，请稍候... 📥');
    const hdUrl = AppData.currentPaidImageUrl;
    if (!hdUrl) throw new Error('No HD image available');

    const response = await fetch(hdUrl);
    if (!response.ok) throw new Error('Download failed');
    const blob = await response.blob();

    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `今日上上签_${AppData.currentFortune.type}_${getBeijingDate()}.png`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    showToast('✅ 高清壁纸下载成功！');
  } catch (err) {
    console.error('Download error:', err);
    const hdUrl = AppData.currentPaidImageUrl;
    if (hdUrl) window.open(hdUrl, '_blank');
    showToast('已在新标签页打开壁纸，请长按保存 💾');
  } finally {
    btn.disabled = false;
    btn.textContent = '📥 下载 4K 高清壁纸';
  }
}

/* ============================================================
   SHARE
   ============================================================ */
function shareFortune() {
  const shareData = {
    title: '今日上上签·AI灵境壁纸',
    text: `我抽到了「${AppData.currentFortune?.type || '吉'}」签！${AppData.currentFortuneText?.substring(0, 30) || '快来抽你的今日灵签吧'}...`,
    url: window.location.href,
  };

  if (navigator.share) {
    navigator.share(shareData).catch(() => {});
  } else {
    navigator.clipboard.writeText(window.location.href).then(() => {
      showToast('链接已复制，快去分享给好友吧 📋');
    }).catch(() => {
      showToast('分享链接：' + window.location.href);
    });
  }
}

/* ============================================================
   INITIALIZATION
   ============================================================ */
function init() {
  // 获取设备ID
  getDeviceId();

  updateQuotaDisplay();

  // Close payment modal on mask click
  $('payment-modal').addEventListener('click', function(e) {
    if (e.target === this) closePaymentModal();
  });

  // Close QR modal on mask click
  $('qr-modal').addEventListener('click', function(e) {
    if (e.target === this) closeQRModal();
  });

  // Enter key for activation code
  const activationInput = document.getElementById('activation-code');
  if (activationInput) {
    activationInput.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') activateMember();
    });
  }
}

document.addEventListener('DOMContentLoaded', init);
</script>
