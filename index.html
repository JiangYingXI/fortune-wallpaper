/* ============================================================
   CSS Reset & Base
   ============================================================ */
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

:root {
  --bg: #0a0a0f;
  --bg-card: rgba(20, 20, 35, 0.85);
  --gold-1: #f5d78c;
  --gold-2: #c4963a;
  --gold-3: #8b6914;
  --neon-gold: #ffd700;
  --neon-amber: #ffb347;
  --text: #e8e0d0;
  --text-dim: #8a8578;
  --red: #e04040;
  --green: #40c080;
  --radius: 16px;
  --radius-sm: 10px;
}

html, body {
  width: 100%; min-height: 100vh; min-height: 100dvh;
  background: var(--bg);
  font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", "Noto Sans SC", sans-serif;
  color: var(--text);
  overflow-x: hidden;
  -webkit-tap-highlight-color: transparent;
  -webkit-font-smoothing: antialiased;
}

/* Subtle animated background grain */
body::before {
  content: '';
  position: fixed; inset: 0; z-index: 0;
  background:
    radial-gradient(ellipse at 20% 20%, rgba(255, 215, 0, 0.04) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 60%, rgba(255, 180, 50, 0.03) 0%, transparent 50%),
    radial-gradient(ellipse at 50% 90%, rgba(200, 150, 50, 0.05) 0%, transparent 40%);
  pointer-events: none;
}

#app {
  position: relative; z-index: 1;
  max-width: 480px; margin: 0 auto;
  min-height: 100vh; min-height: 100dvh;
  display: flex; flex-direction: column; align-items: center;
  padding: 20px 16px 40px;
}

/* ============================================================
   Typography
   ============================================================ */
.gold-text {
  background: linear-gradient(135deg, var(--gold-1), var(--gold-2), var(--gold-1));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
}

.neon-glow {
  text-shadow: 0 0 20px rgba(255, 215, 0, 0.5), 0 0 40px rgba(255, 180, 0, 0.3), 0 0 80px rgba(255, 150, 0, 0.15);
}

/* ============================================================
   Screen Management
   ============================================================ */
.screen { display: none; flex-direction: column; align-items: center; width: 100%; flex: 1; }
.screen.active { display: flex; }

/* ============================================================
   Home Screen
   ============================================================ */
#home-screen { justify-content: center; gap: 32px; padding-top: 10vh; }

.home-icon {
  width: 80px; height: 80px;
  border-radius: 50%;
  background: linear-gradient(135deg, rgba(255,215,0,0.15), rgba(200,150,50,0.1));
  border: 2px solid rgba(255,215,0,0.3);
  display: flex; align-items: center; justify-content: center;
  font-size: 40px;
  animation: iconPulse 3s ease-in-out infinite;
  box-shadow: 0 0 30px rgba(255,215,0,0.2), inset 0 0 30px rgba(255,215,0,0.05);
}

@keyframes iconPulse {
  0%, 100% { box-shadow: 0 0 30px rgba(255,215,0,0.2), inset 0 0 30px rgba(255,215,0,0.05); }
  50% { box-shadow: 0 0 50px rgba(255,215,0,0.4), inset 0 0 50px rgba(255,215,0,0.1); }
}

.home-title {
  font-size: 42px; font-weight: 900; letter-spacing: 4px; text-align: center;
  line-height: 1.3;
}

.home-subtitle {
  font-size: 16px; color: var(--text-dim); letter-spacing: 8px; text-align: center;
  margin-top: -16px;
}

.quota-badge {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 20px; border-radius: 20px;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  font-size: 13px; color: var(--text-dim);
}

.quota-badge .count { color: var(--neon-gold); font-weight: 700; font-size: 16px; }

/* ============================================================
   Buttons
   ============================================================ */
.btn-primary {
  position: relative;
  padding: 16px 48px;
  font-size: 20px; font-weight: 700; letter-spacing: 4px;
  color: #1a1a0a;
  background: linear-gradient(135deg, var(--gold-1), var(--gold-2));
  border: none; border-radius: 50px;
  cursor: pointer;
  transition: all 0.3s ease;
  box-shadow: 0 4px 30px rgba(255, 180, 0, 0.3);
  -webkit-tap-highlight-color: transparent;
  user-select: none;
  -webkit-user-select: none;
}

.btn-primary:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 40px rgba(255, 180, 0, 0.5);
}

.btn-primary:active {
  transform: scale(0.96);
  transition: transform 0.1s;
}

.btn-primary:disabled {
  opacity: 0.4; cursor: not-allowed; transform: none;
  box-shadow: none;
}

.btn-secondary {
  padding: 12px 32px;
  font-size: 16px; font-weight: 600; letter-spacing: 2px;
  color: var(--gold-1);
  background: transparent;
  border: 1.5px solid rgba(255,215,0,0.4);
  border-radius: 50px;
  cursor: pointer;
  transition: all 0.3s ease;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
  -webkit-user-select: none;
}

.btn-secondary:hover {
  background: rgba(255,215,0,0.1);
  border-color: rgba(255,215,0,0.7);
}

.btn-download {
  padding: 14px 40px;
  font-size: 18px; font-weight: 700; letter-spacing: 2px;
  color: #0a0a0f;
  background: linear-gradient(135deg, #4ade80, #22c55e);
  border: none; border-radius: 50px;
  cursor: pointer;
  box-shadow: 0 4px 25px rgba(74, 222, 128, 0.3);
  transition: all 0.3s ease;
  -webkit-tap-highlight-color: transparent;
  animation: downloadGlow 2s ease-in-out infinite;
}

@keyframes downloadGlow {
  0%, 100% { box-shadow: 0 4px 25px rgba(74, 222, 128, 0.3); }
  50% { box-shadow: 0 4px 45px rgba(74, 222, 128, 0.6); }
}

.btn-share {
  padding: 10px 28px;
  font-size: 14px; font-weight: 600;
  color: var(--text-dim);
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 50px;
  cursor: pointer;
  transition: all 0.3s ease;
  -webkit-tap-highlight-color: transparent;
}

.btn-share:hover { color: #fff; border-color: rgba(255,255,255,0.3); }

/* ============================================================
   Shaking Screen
   ============================================================ */
#shaking-screen { justify-content: center; align-items: center; gap: 40px; }

.lot-container {
  width: 120px; height: 200px;
  background: linear-gradient(180deg, #2a1f0a, #4a3020, #2a1f0a);
  border-radius: 20px;
  border: 3px solid var(--gold-2);
  position: relative;
  box-shadow: 0 0 40px rgba(255,180,0,0.3), inset 0 0 20px rgba(0,0,0,0.5);
  display: flex; align-items: center; justify-content: center;
}

.lot-container::before {
  content: '签';
  font-size: 48px; font-weight: 900;
  color: var(--gold-1);
  text-shadow: 0 0 10px rgba(255,215,0,0.5);
}

.lot-container::after {
  content: '';
  position: absolute; bottom: -8px; left: 20%; right: 20%; height: 12px;
  background: linear-gradient(180deg, #3a2010, #1a1008);
  border-radius: 0 0 50% 50%;
}

.shaking .lot-container {
  animation: shakeTube 0.15s ease-in-out infinite;
}

@keyframes shakeTube {
  0%, 100% { transform: translateX(0) rotate(0deg); }
  25% { transform: translateX(-8px) rotate(-8deg); }
  50% { transform: translateX(0) rotate(0deg); }
  75% { transform: translateX(8px) rotate(8deg); }
}

.shaking-text {
  font-size: 18px; color: var(--gold-1); letter-spacing: 4px;
  animation: textFlicker 0.3s ease-in-out infinite;
}

@keyframes textFlicker {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.5; }
}

/* Floating particles during shake */
.shake-particles {
  position: absolute; width: 100%; height: 100%; pointer-events: none;
}

.particle {
  position: absolute;
  width: 4px; height: 4px;
  background: var(--neon-gold);
  border-radius: 50%;
  animation: particleFly 0.8s ease-out infinite;
}

@keyframes particleFly {
  0% { transform: translate(0,0) scale(1); opacity: 1; }
  100% { transform: translate(var(--dx), var(--dy)) scale(0); opacity: 0; }
}

/* ============================================================
   Loading Screen
   ============================================================ */
#loading-screen { justify-content: center; gap: 32px; }

.spinner-ring {
  width: 60px; height: 60px;
  border: 3px solid rgba(255,215,0,0.15);
  border-top-color: var(--gold-1);
  border-radius: 50%;
  animation: spin 1s linear infinite;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

.loading-text {
  font-size: 15px; color: var(--text-dim); letter-spacing: 2px;
  text-align: center; line-height: 1.8;
}

.loading-dots::after {
  content: '';
  animation: dots 1.5s steps(4, end) infinite;
}

@keyframes dots {
  0% { content: ''; }
  25% { content: '.'; }
  50% { content: '..'; }
  75% { content: '...'; }
  100% { content: ''; }
}

/* ============================================================
   Result Screen
   ============================================================ */
#result-screen { gap: 20px; padding-top: 10px; }

.image-container {
  position: relative;
  width: 100%;
  aspect-ratio: 9 / 16;
  max-height: 60vh;
  border-radius: var(--radius);
  overflow: hidden;
  background: #111;
  border: 2px solid rgba(255,215,0,0.2);
  box-shadow: 0 0 40px rgba(0,0,0,0.5);
}

.image-container img {
  width: 100%; height: 100%; object-fit: cover;
  transition: filter 0.5s ease;
}

.image-container img.blurred {
  filter: blur(12px) brightness(0.7);
}

.image-container img.blurred-light {
  filter: blur(4px) brightness(0.9);
}

/* Watermark overlay */
.watermark-overlay {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  pointer-events: none; z-index: 2;
}

.watermark-overlay .watermark-text {
  font-size: clamp(28px, 8vw, 48px);
  font-weight: 900; letter-spacing: 8px;
  color: rgba(255, 255, 255, 0.12);
  border: 3px solid rgba(255, 255, 255, 0.1);
  padding: 12px 24px;
  transform: rotate(-25deg);
  white-space: nowrap;
  text-shadow: 0 0 10px rgba(255,255,255,0.1);
  backdrop-filter: blur(2px);
}

/* Fortune type badge */
.fortune-type-badge {
  display: inline-block;
  padding: 6px 20px;
  font-size: 28px; font-weight: 900; letter-spacing: 6px;
  border-radius: 50px;
  border: 2px solid;
}

.fortune-type-badge.daji {
  color: #ff4444;
  border-color: rgba(255,68,68,0.4);
  background: rgba(255,68,68,0.1);
  text-shadow: 0 0 20px rgba(255,68,68,0.5);
}

.fortune-type-badge.zhongji {
  color: #ff8c00;
  border-color: rgba(255,140,0,0.4);
  background: rgba(255,140,0,0.1);
  text-shadow: 0 0 20px rgba(255,140,0,0.5);
}

.fortune-type-badge.xiaoji {
  color: #ffb347;
  border-color: rgba(255,179,71,0.4);
  background: rgba(255,179,71,0.1);
  text-shadow: 0 0 20px rgba(255,179,71,0.5);
}

.fortune-type-badge.ji {
  color: #ffd700;
  border-color: rgba(255,215,0,0.4);
  background: rgba(255,215,0,0.1);
  text-shadow: 0 0 20px rgba(255,215,0,0.5);
}

.fortune-type-badge.xiong {
  color: #8888cc;
  border-color: rgba(136,136,204,0.4);
  background: rgba(136,136,204,0.1);
  text-shadow: 0 0 20px rgba(136,136,204,0.5);
}

.fortune-type-badge.xiaoxiong {
  color: #9999aa;
  border-color: rgba(153,153,170,0.4);
  background: rgba(153,153,170,0.1);
  text-shadow: 0 0 20px rgba(153,153,170,0.5);
}

/* Fortune card */
.fortune-card {
  width: 100%;
  padding: 20px 24px;
  background: var(--bg-card);
  border-radius: var(--radius);
  border: 1px solid rgba(255,215,0,0.15);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
}

.fortune-label {
  font-size: 12px; color: var(--text-dim); letter-spacing: 4px;

}

.fortune-text {

}

.deep-analysis {

  border-top: 1px solid rgba(255,215,0,0.15);
  font-size: 14px; line-height: 1.9; color: var(--gold-1);
  letter-spacing: 1px;
}

/* Result buttons group */
.result-buttons {
  display: flex; flex-direction: column; gap: 12px; width: 100%; align-items: center;
}

/* ============================================================
   Payment Modal
   ============================================================ */
.modal-mask {
  position: fixed; inset: 0; z-index: 100;
  background: rgba(0,0,0,0.8);
  backdrop-filter: blur(4px);
  -webkit-backdrop-filter: blur(4px);
  display: flex; align-items: center; justify-content: center;
  padding: 20px;
}

.modal-mask.hidden { display: none; }

.payment-modal {
  width: 100%; max-width: 340px;
  background: var(--bg-card);
  border-radius: var(--radius);
  border: 1px solid rgba(255,215,0,0.2);
  padding: 32px 24px;
  text-align: center;
  box-shadow: 0 20px 60px rgba(0,0,0,0.5);
}

.payment-modal h3 {
  font-size: 22px; letter-spacing: 4px;
  margin-bottom: 20px;
}

.payment-modal .qr-wrapper {
  display: inline-block;
  padding: 12px; background: #fff; border-radius: 12px;
  margin-bottom: 16px;
}

.payment-modal .qr-wrapper img {
  display: block; width: 180px; height: 180px;
}

.payment-modal .price {
  font-size: 24px; font-weight: 700; color: var(--neon-gold);
  margin-bottom: 8px;
}

.payment-modal .status {
  font-size: 13px; color: var(--text-dim);
  margin-bottom: 20px;
}

.payment-modal .status.paid {
  color: var(--green); font-weight: 700; font-size: 16px;
}

.payment-modal .btn-cancel {
  padding: 10px 32px;
  font-size: 14px; color: var(--text-dim);
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 50px;
  cursor: pointer;
  transition: all 0.3s;
}

/* ============================================================
   Toast
   ============================================================ */
.toast {
  position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%);
  z-index: 200;
  padding: 12px 28px;
  background: rgba(30,30,50,0.95);
  border: 1px solid rgba(255,215,0,0.3);
  border-radius: 50px;
  font-size: 14px; color: var(--text);
  letter-spacing: 1px;
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  animation: toastIn 0.3s ease, toastOut 0.3s ease 2.5s forwards;
  pointer-events: none;
}

@keyframes toastIn {
  from { opacity: 0; transform: translateX(-50%) translateY(20px); }
  to { opacity: 1; transform: translateX(-50%) translateY(0); }
}

@keyframes toastOut {
  from { opacity: 1; }
  to { opacity: 0; }
}

/* ============================================================
   Footer
   ============================================================ */
.app-footer {
  width: 100%; text-align: center; padding: 20px 0 10px;
  font-size: 11px; color: rgba(255,255,255,0.2);
  letter-spacing: 2px;
}

/* ============================================================
   Responsive: Desktop
   ============================================================ */
@media (min-width: 769px) {

/* ============================================================
   Utility
   ============================================================ */
.hidden { display: none !important; }
.text-center { text-align: center; }
.w-full { width: 100%; }
.mt-8 { margin-top: 8px; }
.mt-16 { margin-top: 16px; }

/* ============================================================
   LOCAL STORAGE HELPERS
   ============================================================ */
const STORAGE_KEY = 'fortunewallpaper_data';

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    return raw ? JSON.parse(raw) : {};
  } catch (e) {
    return {};
  }
}

function saveState(state) {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  } catch (e) {
    // Storage full or unavailable
  }
}

function getToday() {
  return new Date().toISOString().split('T')[0];
}

function checkAndUpdateQuota() {
  const state = loadState();
  const today = getToday();

  if (state.lastFreeDate !== today) {
    state.lastFreeDate = today;
    state.freeCount = 0;
  }

  const remaining = CONFIG.DAILY_FREE_LIMIT - (state.freeCount || 0);
  return { state, remaining, today };
}

function useFreeQuota(state) {
  state.freeCount = (state.freeCount || 0) + 1;
  saveState(state);
}

function markPaid(orderId) {
  const state = loadState();
  state.isPaid = true;
  state.paidOrderId = orderId;
  saveState(state);
}

function isUserPaid() {
  return loadState().isPaid === true;
}

  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));

/* ============================================================
   SHAKING ANIMATION
   ============================================================ */
function createParticles() {
  const container = $('particles');
  container.innerHTML = '';
  for (let i = 0; i < 20; i++) {
    const particle = document.createElement('div');
    particle.className = 'particle';
    particle.style.left = (30 + Math.random() * 40) + '%';
    particle.style.top = (30 + Math.random() * 40) + '%';
    particle.style.setProperty('--dx', (Math.random() - 0.5) * 120 + 'px');
    particle.style.setProperty('--dy', (Math.random() - 0.5) * 120 + 'px');
    particle.style.animationDelay = Math.random() * 0.8 + 's';
    container.appendChild(particle);
  }
}

function playShakeAnimation() {
  return new Promise((resolve) => {
    showScreen('shaking-screen');
    const screen = $('shaking-screen');
    screen.classList.add('shaking');
    createParticles();
    setTimeout(() => {
      screen.classList.remove('shaking');
      resolve();
    }, 1500);
  });
}

/* ============================================================
   IMAGE GENERATION (Pollinations.ai)
   ============================================================ */
function buildImageUrl(fortuneElement, width, height) {
  const basePrompt = `minimalist Chinese aesthetic, ${fortuneElement}, elegant simplicity, warm golden tones, soft lighting, vertical mobile wallpaper, high quality`;
  const encoded = encodeURIComponent(basePrompt);
  return `https://image.pollinations.ai/prompt/${encoded}?width=${width}&height=${height}&nologo=true&timestamp=${Date.now()}`;
}

function loadImage(url) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.crossOrigin = 'anonymous';
    img.onload = () => resolve(url);
    img.onerror = () => {
      // Retry once with different timestamp
      const retryUrl = url.replace(/timestamp=\d+/, `timestamp=${Date.now()}`);
      const img2 = new Image();
      img2.crossOrigin = 'anonymous';
      img2.onload = () => resolve(retryUrl);
      img2.onerror = () => reject(new Error('Image generation failed'));
      img2.src = retryUrl;
    };
    img.src = url;
    // Timeout after 30 seconds
    setTimeout(() => reject(new Error('Image load timeout')), 30000);
  });
}

async function generateDeepAnalysis(fortuneType) {
  if (!CONFIG.ARK_API_KEY || CONFIG.ARK_API_KEY.startsWith('YOUR_')) {
    return DEEP_ANALYSIS_FALLBACKS[fortuneType] || '命理深邃，天机不可尽述。愿你在今日的旅途中，保持一颗平和的心，所有的美好都将如约而至。';
  }

  try {
    const response = await fetch(`${CONFIG.ARK_BASE_URL}/chat/completions`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${CONFIG.ARK_API_KEY}`,
      },
      body: JSON.stringify({
        model: CONFIG.ARK_MODEL,
        messages: [
          {
            role: 'system',
            content: '你是一位精通命理学、风水学和现代心理学的运势分析师。请根据签种生成一段200字的深度命理解读，涵盖事业、财运、感情、健康四个方面，语言要有深度但不晦涩，给人启迪和方向感。'
          },
          {
            role: 'user',
            content: `签种：${fortuneType}。请为我做深度命理解读。`
          }
        ],
        max_tokens: 500,
        temperature: 0.7,
      }),
    });

    if (!response.ok) throw new Error(`API error: ${response.status}`);
    const data = await response.json();
    const text = data.choices?.[0]?.message?.content?.trim();
    if (text && text.length > 30) return text;
    throw new Error('Empty or too short response');
  } catch (err) {
    console.warn('Ark 深度解析失败，使用备选:', err.message);
    return DEEP_ANALYSIS_FALLBACKS[fortuneType] || '命理深邃，天机不可尽述。愿你在今日的旅途中，保持一颗平和的心，所有的美好都将如约而至。';
  }
}

async function startDraw() {
  const { state, remaining } = checkAndUpdateQuota();

  if (remaining <= 0 && !isUserPaid()) {
    showToast('今日免费次数已用完，请明天再来或支付解锁 🔒');
    return;
  }

  const btn = $('btn-draw');
  btn.disabled = true;
  btn.textContent = '灵签生成中...';

  try {
    // 1. Pick fortune
    currentFortune = pickFortune();
    currentDrawNumber = (state.freeCount || 0) + 1;

    // 2. Play shake animation (1.5s)
    await playShakeAnimation();

    // 3. Show result immediately (don't wait for loading screen)
    showResultSkeleton();

    // 4. Determine image quality based on draw number
    let imgWidth, imgHeight;
    if (isUserPaid()) {
      imgWidth = CONFIG.PAID_IMAGE_WIDTH;
      imgHeight = CONFIG.PAID_IMAGE_HEIGHT;
    } else if (currentDrawNumber <= CONFIG.FREE_HQ_COUNT) {
      imgWidth = CONFIG.FREE_HQ_WIDTH;
      imgHeight = CONFIG.FREE_HQ_HEIGHT;
    } else {
      imgWidth = CONFIG.FREE_MQ_WIDTH;
      imgHeight = CONFIG.FREE_MQ_HEIGHT;
    }

    // 5. Build image URLs
    currentFreeImageUrl = buildImageUrl(currentFortune.element, imgWidth, imgHeight);
    currentPaidImageUrl = buildImageUrl(currentFortune.element, CONFIG.PAID_IMAGE_WIDTH, CONFIG.PAID_IMAGE_HEIGHT);

    // 6. Get fortune text instantly from library (zero delay)
    currentFortuneText = pickFortuneText(currentFortune.type);

    // 7. Update UI with text
    $('fortune-text').textContent = currentFortuneText;

    // 8. Start loading image in background
    const img = $('result-image');
    img.src = currentFreeImageUrl;

    // 9. Update quota
    if (!isUserPaid()) {
      useFreeQuota(state);
    }

  } catch (err) {
    console.error('Draw failed:', err);
    currentFortuneText = pickFortuneText(currentFortune?.type || '吉');
    currentFreeImageUrl = buildImageUrl(currentFortune?.element || 'golden sunrise',
      currentDrawNumber <= CONFIG.FREE_HQ_COUNT ? CONFIG.FREE_HQ_WIDTH : CONFIG.FREE_MQ_WIDTH,
      currentDrawNumber <= CONFIG.FREE_HQ_COUNT ? CONFIG.FREE_HQ_HEIGHT : CONFIG.FREE_MQ_HEIGHT);
    showResultImmediate();
    showToast('网络波动，已为您使用本地备选方案 ✨');
  } finally {
    btn.disabled = false;
    btn.textContent = '🎋 抽今日灵签';
    updateQuotaDisplay();
  }
}

  // Set fortune badge
  const badge = $('fortune-badge');
  badge.textContent = currentFortune.type;
  badge.className = 'fortune-type-badge ' + currentFortune.cssClass;

  // Show loading text
  $('fortune-text').textContent = currentFortuneText;
  $('deep-analysis').classList.add('hidden');

  // Check if user already paid
  if (isUserPaid()) {
    showPaidUI();
  } else {
    $('btn-pay').classList.remove('hidden');
    $('btn-download').classList.add('hidden');
  }

  window.scrollTo({ top: 0, behavior: 'smooth' });
}

/* Apply image quality and watermark based on tier */
function applyTierEffects() {
  const img = $('result-image');
  const watermark = $('watermark-overlay');
  const watermarkText = watermark?.querySelector('.watermark-text');

  if (isUserPaid()) {
    // Paid: no blur, no watermark
    img.classList.remove('blurred', 'blurred-light');
    watermark.classList.add('hidden');
    return;
  }

  if (currentDrawNumber <= CONFIG.FREE_HQ_COUNT) {
    // Free HQ (1-3): no blur, no watermark, high quality
    img.classList.remove('blurred', 'blurred-light');
    watermark.classList.add('hidden');
    // Update hint text
    const hint = watermark?.querySelector('span:last-child');
    if (hint) hint.textContent = `🎁 前${CONFIG.FREE_HQ_COUNT}次免费高清 · 还剩${CONFIG.FREE_HQ_COUNT - currentDrawNumber + 1}次`;
  } else {
    // Free MQ (4-5): light blur, 5% watermark
    img.classList.add('blurred-light');
    img.classList.remove('blurred');
    watermark.classList.remove('hidden');
    if (watermarkText) {
      watermarkText.style.opacity = '0.05';
      watermarkText.style.borderColor = 'rgba(255,255,255,0.03)';
    }
    const hint = watermark?.querySelector('span:last-child');
    if (hint) hint.textContent = '支付 10 元解锁高清无水印 · 验证码 LUCKY2026';
  }
}

function showResultImmediate() {
  showResultSkeleton();
  const img = $('result-image');
  img.src = currentFreeImageUrl;
  $('fortune-text').textContent = currentFortuneText;
}

function showResult() {
  // Legacy - kept for compatibility
  showResultImmediate();
}

function showPaidUI() {
  $('watermark-overlay').classList.add('hidden');
  const img = $('result-image');
  img.classList.remove('blurred', 'blurred-light');
  img.src = currentPaidImageUrl;

  $('btn-pay').classList.add('hidden');
  $('btn-download').classList.remove('hidden');

  $('deep-analysis').classList.remove('hidden');
  if (currentDeepAnalysis) {
    $('deep-analysis-text').textContent = currentDeepAnalysis;
  } else {
    $('deep-analysis-text').textContent = '命理深邃，正在为你解读...';
    generateDeepAnalysis(currentFortune.type).then(text => {
      currentDeepAnalysis = text;
      $('deep-analysis-text').textContent = text;
    });
  }
}

/* ============================================================
   PAYMENT (微信扫码 + 验证码)
   ============================================================ */
function startPayment() {
  $('payment-modal').classList.remove('hidden');
  $('payment-status').textContent = '支付后输入验证码：' + CONFIG.PAYMENT_VERIFY_CODE;
  $('payment-status').className = 'status';
  $('verify-code').value = '';
  $('verify-code').focus();
}

function verifyPaymentCode() {
  const input = $('verify-code').value.trim().toUpperCase();
  if (input === CONFIG.PAYMENT_VERIFY_CODE) {
    // Payment verified!
    $('payment-status').textContent = '✅ 验证成功！高清壁纸已解锁';
    $('payment-status').className = 'status paid';

    markPaid('QR_' + Date.now());

    // Generate deep analysis
    generateDeepAnalysis(currentFortune.type).then(text => {
      currentDeepAnalysis = text;
    });

    setTimeout(() => {
      closePayment();
      showPaidUI();
      showToast('🎉 支付成功！高清壁纸已解锁');
    }, 1000);
  } else {
    $('payment-status').textContent = '❌ 验证码错误，请重新输入';
    $('payment-status').className = 'status';
    $('verify-code').value = '';
    $('verify-code').focus();
    // Shake the input
    $('verify-code').style.animation = 'shakeTube 0.3s ease-in-out';
    setTimeout(() => $('verify-code').style.animation = '', 300);
  }
}

// Allow Enter key to submit verification code
document.addEventListener('DOMContentLoaded', function() {
  const verifyInput = document.getElementById('verify-code');
  if (verifyInput) {
    verifyInput.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') verifyPaymentCode();
    });
  }
});

function closePayment() {
  $('payment-modal').classList.add('hidden');
}

/* ============================================================
   DOWNLOAD HD WALLPAPER
   ============================================================ */
async function downloadHD() {
  const btn = $('btn-download');
  btn.disabled = true;
  btn.textContent = '生成中...';

  try {
    showToast('正在生成 4K 高清壁纸，请稍候... 📥');

    // Load the high-res image
    const hdUrl = currentPaidImageUrl || buildImageUrl(currentFortune.element, CONFIG.PAID_IMAGE_WIDTH, CONFIG.PAID_IMAGE_HEIGHT);

    // Fetch image as blob
    const response = await fetch(hdUrl);
    if (!response.ok) throw new Error('Download failed');
    const blob = await response.blob();

    // Trigger download
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `今日上上签_${currentFortune.type}_${getToday()}.png`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);

    showToast('✅ 高清壁纸下载成功！');
  } catch (err) {
    console.error('Download error:', err);
    // Fallback: open image in new tab
    const hdUrl = currentPaidImageUrl || buildImageUrl(currentFortune.element, CONFIG.PAID_IMAGE_WIDTH, CONFIG.PAID_IMAGE_HEIGHT);
    window.open(hdUrl, '_blank');
    showToast('已在新标签页打开壁纸，请长按保存 💾');
  } finally {
    btn.disabled = false;
    btn.textContent = '📥 下载 4K 高清壁纸';
  }
}

/* ============================================================
   SHARE
   ============================================================ */
function shareFortune() {
  const shareData = {
    title: '今日上上签·AI灵境壁纸',
    text: `我抽到了「${currentFortune?.type || '吉'}」签！${currentFortuneText?.substring(0, 30) || '快来抽你的今日灵签吧'}...`,
    url: window.location.href,
  };

  if (navigator.share) {
    navigator.share(shareData).catch(() => {
      // User cancelled, no-op
    });
  } else {
    // Fallback: copy link
    navigator.clipboard.writeText(window.location.href).then(() => {
      showToast('链接已复制，快去分享给好友吧 📋');
    }).catch(() => {
      showToast('分享链接：' + window.location.href);
    });
  }
}

/* ============================================================
   INITIALIZATION
   ============================================================ */
function init() {
  updateQuotaDisplay();

  // If user was paid, restore UI state hint
  const state = loadState();
  if (state.isPaid && state.lastFreeDate === getToday()) {
    // User paid today, could show a badge but keeping it simple
  }

  // Close payment modal on mask click
  $('payment-modal').addEventListener('click', function(e) {
    if (e.target === this) closePayment();
  });
}

// Start the app
document.addEventListener('DOMContentLoaded', init);
</script>
